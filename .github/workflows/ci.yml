name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y gcc libssl-dev

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Verify vendored checksums
        run: ./scripts/vendor_check.sh

      - name: Rust VM tests
        run: cargo test

      - name: Bootstrap native CLI
        run: ./build.sh

      - name: Verify bootstrap/cli.c is up to date
        run: |
          cargo run --quiet -- run std/compiler/cgen.a -- src/cli.a > /tmp/bootstrap_verify.c 2>/dev/null
          if ! diff -q bootstrap/cli.c /tmp/bootstrap_verify.c > /dev/null 2>&1; then
            echo "ERROR: bootstrap/cli.c is out of date."
            echo "Regenerate with: cargo run --quiet -- run std/compiler/cgen.a -- src/cli.a > bootstrap/cli.c"
            diff bootstrap/cli.c /tmp/bootstrap_verify.c | head -20
            exit 1
          fi
          echo "bootstrap/cli.c is up to date."

      - name: Smoke test -- hello
        run: ./a run examples/hello.a

      - name: Native test suite
        run: ./a test tests/native/
