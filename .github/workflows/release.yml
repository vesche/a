name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
            gcc: gcc
          - os: ubuntu-latest
            target: linux-arm64
            gcc: aarch64-linux-gnu-gcc
            cross: true
          - os: macos-latest
            target: darwin-arm64
            gcc: gcc
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Install cross-compiler (Linux arm64)
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux' && !matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc libssl-dev

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Bootstrap self-hosted compiler
        if: "!matrix.cross"
        run: ./build.sh

      - name: Bootstrap self-hosted compiler (cross-compile host)
        if: matrix.cross
        run: |
          sudo apt-get install -y gcc libssl-dev
          ./build.sh

      - name: Generate C sources
        run: |
          ./a cc src/cli.a -o /tmp/cli.c
          ./a cc src/lsp.a -o /tmp/lsp.c

      - name: Generate embedded runtime bundle
        run: python3 scripts/embed.py > /tmp/embedded.c

      - name: Detect platform flags
        id: flags
        run: |
          OS=$(uname -s)
          if [ "$OS" = "Darwin" ]; then
            echo "stack=-Wl,-stack_size,0x10000000" >> "$GITHUB_OUTPUT"
            echo "tls=-framework Security -framework CoreFoundation" >> "$GITHUB_OUTPUT"
          else
            echo "stack=" >> "$GITHUB_OUTPUT"
            echo "tls=-ldl" >> "$GITHUB_OUTPUT"
          fi

      - name: Build native binaries
        run: |
          CC=${{ matrix.gcc }}
          STACK="${{ steps.flags.outputs.stack }}"
          TLS="${{ steps.flags.outputs.tls }}"
          SQLITE="-DSQLITE_THREADSAFE=0 -DSQLITE_OMIT_LOAD_EXTENSION"
          $CC /tmp/cli.c c_runtime/runtime.c c_runtime/sqlite3.c c_runtime/miniz.c c_runtime/stb_impl.c /tmp/embedded.c -o a -I c_runtime -lm -O2 $STACK $TLS $SQLITE
          $CC /tmp/lsp.c c_runtime/runtime.c c_runtime/sqlite3.c c_runtime/miniz.c c_runtime/stb_impl.c /tmp/embedded.c -o a-lsp -I c_runtime -lm -O2 $STACK $TLS $SQLITE

      - name: Package release tarball
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCHIVE="a-${VERSION}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" a a-lsp README.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload release artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ARCHIVE }}

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v6
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: "*.tar.gz"
          generate_release_notes: true
